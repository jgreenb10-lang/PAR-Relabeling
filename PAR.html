<!-- Code Generated by Sidekick is for learning and experimentation purposes only. --><!-- filename: iphone-single-item-ocr.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>iPhone Single Item OCR</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root{--g:#86BC25;--b:#d1d5db;--bg:#f4f6f8;--t:#111827;--m:#6b7280}
    *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:var(--bg);color:var(--t)} .wrap{max-width:820px;margin:0 auto;padding:16px}
    .card{background:#fff;border:1px solid var(--b);border-radius:16px;padding:14px;margin-bottom:14px}
    .grid,.actions,.meta{display:grid;gap:10px}.meta{grid-template-columns:repeat(3,1fr)}.actions{grid-template-columns:1fr 1fr}
    input,button{width:100%;min-height:48px;padding:12px;border-radius:12px;border:1px solid var(--b);font-size:16px}
    button{background:var(--g);color:#fff;border:none;font-weight:700} button.alt{background:#eef2f7;color:#111827}
    img{width:100%;max-height:430px;object-fit:contain;border:1px solid var(--b);border-radius:12px;background:#f3f4f6}
    h1,h2,p{margin:0 0 8px}.small{font-size:12px;color:var(--m)} .status,.list,.result{border:1px solid var(--b);border-radius:12px;padding:10px;background:#fafafa}
    .result{font-size:28px;font-weight:800;text-align:center}
    @media (max-width:640px){.meta,.actions{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Single Item OCR</h1>
    <p class="small">Best on iPhone Safari. Take a close photo of one box only, then read the code.</p>

    <div class="card">
      <div class="meta">
        <input id="rack" value="01" maxlength="2" placeholder="Rack">
        <input id="bin" value="A" maxlength="1" placeholder="Bin">
        <input id="item" value="01" maxlength="2" placeholder="Item">
      </div>
    </div>

    <div class="card">
      <input id="photo" type="file" accept="image/*" capture="environment">
      <div class="small" style="margin-top:8px">This opens the iPhone rear camera or Photos.</div>
    </div>

    <div class="card">
      <img id="preview" alt="Item preview">
      <div id="status" class="status" style="margin-top:10px">Take a close photo first.</div>
    </div>

    <div class="card">
      <h2>Detected code</h2>
      <div id="result" class="result">—</div>
      <input id="manual" placeholder="Manual correction, e.g. J553G" style="margin-top:10px">
      <div class="actions" style="margin-top:10px">
        <button id="readBtn">Read Item</button>
        <button id="saveBtn" class="alt">Save Code</button>
      </div>
      <div class="actions" style="margin-top:10px">
        <button id="nextBtn">Next Item</button>
        <button id="clearBtn" class="alt">Clear Photo</button>
      </div>
    </div>

    <div class="card">
      <h2>Saved items</h2>
      <div id="saved" class="list"></div>
    </div>
  </div>

  <script>
    const TOTAL=40, state={worker:null,imageReady:false,detected:"",saved:Array(TOTAL).fill("")};
    const $=id=>document.getElementById(id), pad2=v=>String(Math.max(1,Number(v)||1)).padStart(2,"0");
    const loc=i=>`${pad2($("rack").value)}${($("bin").value||"A").toUpperCase().replace(/[^A-Z]/g,"").slice(0,1)||"A"}${pad2(i)}`;
    const setStatus=t=>$("status").textContent=t;
    const isRef=v=>/^J\d{3}[A-Z]$/.test(v);

    function normalizeRef(v){
      const raw=(v||"").toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,5); if(!raw) return "";
      const c=raw.split(""), num={O:"0",Q:"0",D:"0",I:"1",L:"1",Z:"2",S:"5",B:"8",G:"6"}, tail={"0":"G","6":"G","1":"I","5":"S","8":"B"};
      if(c[0]==="0"||c[0]==="1"||c[0]==="I") c[0]="J";
      for(let i=1;i<=3;i++) if(c[i]&&num[c[i]]) c[i]=num[c[i]];
      if(c[4]&&tail[c[4]]) c[4]=tail[c[4]];
      return c.join("");
    }

    function renderSaved(){
      const rows=state.saved.map((v,i)=>v?`${loc(i+1)} = ${v}`:"").filter(Boolean);
      $("saved").innerHTML=rows.length?rows.join("<br>"):`<span class="small">Nothing saved yet.</span>`;
    }

    function setDetected(v){
      state.detected=v||""; $("result").textContent=state.detected||"—"; $("manual").value=state.detected;
    }

    async function ensureWorker(){
      if(state.worker) return state.worker;
      setStatus("Loading OCR...");
      state.worker=await Tesseract.createWorker("eng");
      await state.worker.setParameters({tessedit_char_whitelist:"J0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"});
      return state.worker;
    }

    function bestRef(data){
      const seen=[], push=t=>{const r=normalizeRef(t); if(isRef(r)&&!seen.includes(r)) seen.push(r);};
      (data.words||[]).sort((a,b)=>(b.confidence||0)-(a.confidence||0)).forEach(w=>push(w.text));
      const merged=(data.text||"").toUpperCase().replace(/[^A-Z0-9]/g,"");
      for(let i=0;i<=merged.length-5;i++) push(merged.slice(i,i+5));
      return seen[0]||"";
    }

    async function readItem(){
      if(!state.imageReady) return setStatus("Take a photo first.");
      try{
        const worker=await ensureWorker();
        setStatus("Reading item...");
        const {data}=await worker.recognize($("preview"));
        const ref=bestRef(data);
        setDetected(ref);
        setStatus(ref?`Detected ${ref}. Review and save.`:"No valid code found. Move closer and retake.");
      }catch(e){ setStatus(`OCR error: ${e.message}`); }
    }

    function saveCode(){
      const ref=normalizeRef($("manual").value);
      if(!isRef(ref)) return setStatus("Code format looks off. Example: J553G");
      const idx=Math.min(TOTAL,Math.max(1,Number($("item").value)||1));
      state.saved[idx-1]=ref; setDetected(ref);
      setStatus(`Saved ${ref} to ${loc(idx)}.`);
      renderSaved();
    }

    function nextItem(){
      $("item").value=pad2(Math.min(TOTAL,(Number($("item").value)||1)+1));
      setDetected(""); setStatus(`Ready for ${loc($("item").value)}.`);
    }

    function clearPhoto(){
      $("photo").value=""; $("preview").removeAttribute("src"); state.imageReady=false; setDetected("");
      setStatus("Photo cleared.");
    }

    $("photo").addEventListener("change",e=>{
      const file=e.target.files[0]; if(!file) return;
      $("preview").src=URL.createObjectURL(file);
      $("preview").onload=()=>{state.imageReady=true; setStatus("Photo loaded. Tap Read Item.");};
    });
    $("readBtn").onclick=readItem;
    $("saveBtn").onclick=saveCode;
    $("nextBtn").onclick=nextItem;
    $("clearBtn").onclick=clearPhoto;
    $("manual").addEventListener("input",()=>setDetected(normalizeRef($("manual").value)));
    ["rack","bin","item"].forEach(id=>$(id).addEventListener("input",renderSaved));

    renderSaved();
  </script>
</body>
</html>
